<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authenticate · Headshot Cape Town</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f9f8f5;
        color: #021353;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        text-align: center;
      }
      .box {
        max-width: 420px;
        padding: 32px;
      }
      h1 { font-size: 20px; margin: 0 0 12px; }
      p { font-size: 14px; opacity: 0.7; margin: 0; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Setting up your account…</h1>
      <p>If a window doesn't appear within a few seconds, refresh this page.</p>
    </div>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      (function () {
        if (!window.netlifyIdentity) return;
        window.netlifyIdentity.init({
          APIUrl: "https://curious-fenglisu-beffbf.netlify.app/.netlify/identity",
        });
        window.netlifyIdentity.on("login", function () {
          window.location.href = "/admin/";
        });
        window.netlifyIdentity.on("close", function () {
          if (!window.netlifyIdentity.currentUser()) {
            window.location.href = "/admin/";
          }
        });
      })();
    </script>
  </body>
</html>
