backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

site_url: https://headshotcapetown.co.za
display_url: https://headshotcapetown.co.za
logo_url: /images/logo.svg

collections:
  - name: "site"
    label: "Site content"
    files:
      - file: "content/site.md"
        label: "Homepage"
        name: "homepage"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline line 1", name: "headline_line1", widget: "string" }
              - { label: "Headline line 2", name: "headline_line2", widget: "string" }
              - { label: "Headline italic word", name: "headline_italic", widget: "string" }
              - { label: "Headline line 3", name: "headline_line3", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Primary CTA", name: "primary_cta", widget: "string" }
              - { label: "Secondary CTA", name: "secondary_cta", widget: "string" }
              - { label: "Hero portrait", name: "portrait", widget: "image", required: false, hint: "Tall portrait for the hero section. 4:5 ratio works best." }
          - label: "Personal section"
            name: "personal"
            widget: "object"
            fields:
              - { label: "Portrait", name: "portrait", widget: "image", required: false, hint: "Portrait shown in the 'For individuals' section. 4:5 ratio." }
          - label: "Trust"
            name: "trust"
            widget: "object"
            fields:
              - { label: "Rating", name: "rating", widget: "number", value_type: "float" }
              - { label: "Rating count", name: "rating_count", widget: "number" }
              - { label: "Years in business", name: "years", widget: "number" }
              - { label: "Clients count", name: "clients_count", widget: "string" }
          - label: "On location"
            name: "on_location"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Headline italic", name: "headline_italic", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Team shot 1 (top right)", name: "image_1", widget: "image", required: false, hint: "Landscape orientation works best." }
              - { label: "Team shot 2 (bottom left)", name: "image_2", widget: "image", required: false, hint: "Portrait orientation works best." }
              - label: "Stats"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Number / label", name: "k", widget: "string" }
                  - { label: "Caption", name: "v", widget: "string" }
          - label: "Process"
            name: "process"
            widget: "object"
            fields:
              - label: "Steps"
                name: "steps"
                widget: "list"
                fields:
                  - { label: "Number", name: "n", widget: "string" }
                  - { label: "Title", name: "t", widget: "string" }
                  - { label: "Description", name: "d", widget: "text" }
          - label: "FAQ"
            name: "faq"
            widget: "list"
            fields:
              - { label: "Question", name: "q", widget: "string" }
              - { label: "Answer", name: "a", widget: "text" }

      - file: "content/pricing.md"
        label: "Pricing"
        name: "pricing"
        fields:
          - label: "Packages"
            name: "packages"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Price", name: "price", widget: "number", required: false }
              - { label: "Price from", name: "price_from", widget: "number", required: false }
              - { label: "Blurb", name: "blurb", widget: "text" }
              - { label: "Features", name: "features", widget: "list" }

  - name: "testimonials"
    label: "Testimonials"
    folder: "content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Quote", name: "quote", widget: "text" }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Company", name: "company", widget: "string", required: false }
      - { label: "Portrait", name: "portrait", widget: "image", required: false, hint: "Only used on featured testimonials. 4:5 ratio." }
      - { label: "Featured (large)", name: "featured", widget: "boolean", default: false }
      - { label: "Order", name: "order", widget: "number" }

  - name: "journal"
    label: "Journal articles"
    folder: "content/journal"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Tag", name: "tag", widget: "select", options: ["Wardrobe", "Pricing", "Process", "Behind the scenes", "Tips"] }
      - { label: "Read time", name: "readTime", widget: "string", default: "4 min read" }
      - { label: "Publish date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Cover image", name: "cover", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "client-logos"
    label: "Client logos"
    folder: "content/client-logos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Logo (SVG or PNG)", name: "logo", widget: "image" }
      - { label: "Order", name: "order", widget: "number", default: 1 }
